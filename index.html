
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Shop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- top -->
<div class="top-bar">
<div>
<span>Thông báo</span>
<span>Hỗ trợ</span>
<span>Tiếng Việt</span>
</div>
<div>
<span onclick="openLogin()">Đăng nhập</span>
<span>Đăng ký</span>
</div>
</div>

<!-- header -->
<div class="header">
<div class="logo">Beauty Shop</div>

<div class="search">
<input type="text" placeholder="Tìm sản phẩm...">
<button>Tìm</button>
</div>

<div class="cart" onclick="openCart()">
🛒 <span id="cart-count">0</span>
</div>
</div>

<!-- banner -->
<div class="banner">
Chào mừng đến Beauty Shop
</div>

<div class="main">
<!-- sidebar -->
<div class="sidebar">
<h3>Danh mục</h3>
<ul>
<li>Son môi</li>
<li>Kem dưỡng</li>
<li>Sữa rửa mặt</li>
<li>Nước hoa</li>
</ul>
</div>

<!-- products -->
<div class="content">
<h2>Sản phẩm</h2>
<div class="products" id="product-list"></div>
</div>
</div>

<!-- login -->
<div class="modal" id="login-modal">
<div class="modal-content">
<h3>Đăng nhập</h3>
<input placeholder="Tài khoản">
<input type="password" placeholder="Mật khẩu">
<button>Đăng nhập</button>
<button onclick="closeLogin()">Đóng</button>
</div>
</div>

<!-- cart -->
<div class="modal" id="cart-modal">
<div class="modal-content">
<h3>Giỏ hàng</h3>
<div id="cart-items"></div>
<button onclick="closeCart()">Đóng</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
